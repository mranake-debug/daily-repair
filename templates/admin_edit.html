{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <i class="bi bi-pencil-square"></i> แก้ไขข้อมูล
            </div>
            <div class="card-body">
                <form method="post">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-building"></i> อาคาร</label>
                            <select class="form-select" name="building_id" required>
                                <option value="">-- เลือกอาคาร --</option>
                                {% for building in building_options %}
                                <option value="{{ building.id }}" {% if building.name == log.building %}selected{% endif %}>
                                    {{ building.name }} — จำนวนชิ้นงานทั้งหมด {{ building.total_items }} ชิ้น
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-calendar"></i> วันที่</label>
                            <input type="date" class="form-control" name="date" value="{{ log.date }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-box"></i> ชื่อชิ้นงาน</label>
                            <input type="text" class="form-control" name="item_name" value="{{ log.item_name }}" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold"><i class="bi bi-geo-alt"></i> โซน</label>
                            <input type="text" class="form-control" name="zone" value="{{ log.zone }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-exclamation-triangle"></i> อาการเสีย</label>
                        <textarea class="form-control" name="fault_desc" rows="3" required>{{ log.fault_desc }}</textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-check-circle"></i> สถานะ</label>
                        <select class="form-select" name="status" required>
                            <option value="fixable" {% if log.status == 'fixable' %}selected{% endif %}>✔ ซ่อมได้</option>
                            <option value="unfixable" {% if log.status == 'unfixable' %}selected{% endif %}>✘ ซ่อมไม่ได้</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold"><i class="bi bi-journal-text"></i> บันทึกอื่น ๆ</label>
                        <textarea class="form-control" name="notes" rows="2">{{ log.notes }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save"></i> บันทึก
                        </button>
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                            <i class="bi bi-x-circle"></i> ยกเลิก
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
