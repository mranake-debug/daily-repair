{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-warning">
                <i class="bi bi-check2-square"></i> ปิดงานซ่อม
            </div>
            <div class="card-body">
                <div class="alert alert-light border">
                    <div><strong>อาคาร:</strong> {{ log.building }}</div>
                    <div><strong>วันที่บันทึก:</strong> {{ log.date }}</div>
                    <div><strong>ชื่อชิ้นงาน:</strong> {{ log.item_name }}</div>
                    <div><strong>สถานะครั้งแรก:</strong>
                        {% if log.status == 'fixable' %}
                        <span class="badge bg-success">✔ ซ่อมได้</span>
                        {% else %}
                        <span class="badge bg-danger">✘ ซ่อมไม่ได้</span>
                        {% endif %}
                    </div>
                </div>

                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">ผลการปิดงาน</label>
                        <select name="final_result" class="form-select" required>
                            <option value="">-- เลือกผลการปิดงาน --</option>
                            <option value="fixed">ซ่อมเสร็จแล้ว</option>
                            <option value="unfixed">ปิดงานไม่ได้</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">วันที่ปิดงาน</label>
                        <input type="date" name="closed_date" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">หมายเหตุการปิดงาน</label>
                        <textarea name="close_note" class="form-control" rows="3" placeholder="เช่น ซ่อมเสร็จเรียบร้อย / รอเปลี่ยนอุปกรณ์ใหม่"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="bi bi-check-circle"></i> ยืนยันปิดงาน
                        </button>
                        <a href="{{ url_for('admin_dashboard') }}" class="btn btn-secondary">
                            <i class="bi bi-arrow-left"></i> กลับ
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
